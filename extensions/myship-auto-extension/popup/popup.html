<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>賣貨便自動開賣場</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>賣貨便自動開賣場</h1>
      <button id="logoutBtn" class="btn-icon" title="登出" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <!-- 登入區塊 -->
    <section id="loginSection">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="passwordInput" placeholder="密碼">
      </div>
      <button id="loginBtn" class="btn-primary">登入</button>
      <div id="loginError" class="error-msg" style="display:none;"></div>
    </section>

    <!-- 選擇租戶 -->
    <section id="tenantSection" style="display:none;">
      <div class="section-title">選擇店家</div>
      <select id="tenantSelect" class="select-input">
        <option value="">-- 請選擇 --</option>
      </select>
      <button id="confirmTenantBtn" class="btn-primary" disabled>確認</button>
    </section>

    <!-- 待處理列表 -->
    <section id="checkoutSection" style="display:none;">
      <div class="section-header">
        <div class="section-title">待處理結帳單</div>
        <button id="refreshBtn" class="btn-icon" title="重新整理">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>

      <div id="totalInfo" class="total-info" style="display:none;"></div>

      <div id="selectAllWrap" class="select-all-wrap" style="display:none;">
        <label><input type="checkbox" id="selectAllCb"> 全選</label>
        <div class="quick-select">
          <button type="button" id="selectTopHalfBtn" class="btn-mini">上半</button>
          <button type="button" id="selectBottomHalfBtn" class="btn-mini">下半</button>
          <button type="button" id="clearSelectBtn" class="btn-mini">清除</button>
        </div>
      </div>

      <div id="checkoutList" class="checkout-list">
        <div class="loading">載入中...</div>
      </div>

      <div id="selectedInfo" class="selected-info" style="display:none;">
        已選 <span id="selectedCount">0</span> 筆
        <span class="selected-amount">| 總金額 $<span id="selectedAmount">0</span></span>
      </div>

      <button id="startBtn" class="btn-primary" disabled>
        開始自動開賣場
      </button>

      <div id="statusMsg" class="status-msg" style="display:none;"></div>
    </section>

    <!-- 執行進度區塊 -->
    <section id="progressSection" style="display:none;">
      <div class="section-header">
        <div class="section-title">執行進度</div>
        <button id="backToListBtn" class="btn-icon" title="返回列表">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      </div>

      <div class="progress-bar"><div class="progress-fill" id="popupProgressFill"></div></div>
      <div id="progressStats" class="progress-stats"></div>

      <div id="progressQueue" class="checkout-list"></div>

      <div class="progress-controls" id="progressControls">
        <button class="ctrl-btn pause-btn" id="popupPauseBtn">⏸ 暫停</button>
        <button class="ctrl-btn resume-btn" id="popupResumeBtn" style="display:none;">▶ 繼續</button>
        <button class="ctrl-btn stop-btn" id="popupStopBtn">⏹ 中止</button>
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
